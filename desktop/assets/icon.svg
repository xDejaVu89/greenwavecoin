<!-- Simple SVG placeholder icon for GreenWaveCoin -->
<svg width="256" height="256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#007a5e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circle background -->
  <circle cx="128" cy="128" r="120" fill="url(#grad)"/>
  
  <!-- Wave symbol -->
  <path d="M 50 128 Q 75 100, 100 128 T 150 128 T 200 128" 
        stroke="white" 
        stroke-width="12" 
        fill="none" 
        stroke-linecap="round"/>
  
  <!-- GWC text -->
  <text x="128" y="180" 
        font-family="Arial, sans-serif" 
        font-size="40" 
        font-weight="bold" 
        fill="white" 
        text-anchor="middle">GWC</text>
</svg>
