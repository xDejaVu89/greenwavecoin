version: '3.9'

# GreenWaveCoin — Production Docker Compose
# ==========================================
# Runs the backend coordinator with persistent SQLite storage.
# The AI workers run separately on contributor machines.
#
# Usage:
#   cp .env.example .env        # fill in your secrets
#   docker compose up -d        # start in background
#   docker compose logs -f      # tail logs
#   docker compose down         # stop

services:
  coordinator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gwc-coordinator
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_PATH: /app/data/gwc.db
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      WORKER_API_KEY: ${WORKER_API_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-120}
    volumes:
      - gwc_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  gwc_data:
    driver: local
